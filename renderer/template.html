<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1350px;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
      background: #1a1a1a;
      position: relative;
    }
    .bg {
      position: absolute; inset: 0;
      background-image: url('{{ bg_url }}');
      background-size: cover; background-position: center;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0.8) 100%);
    }
    .content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      padding: 60px 72px;
    }
    /* 로고 */
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: #E8632A;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .logo-text { color: white; font-weight: 700; font-size: 28px; letter-spacing: -0.5px; }

    /* 메인 콘텐츠 */
    .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

    /* 표지 전용 */
    .badge {
      display: inline-block;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 50px;
      padding: 12px 36px;
      color: white; font-size: 24px; font-weight: 500; letter-spacing: 3px;
      margin-bottom: 48px;
    }
    .cover-heading { color: white; font-size: 80px; font-weight: 900; line-height: 1.15; margin-bottom: 24px; word-break: keep-all; }
    .cover-sub { color: rgba(255,255,255,0.8); font-size: 30px; font-weight: 400; line-height: 1.6; }

    /* 본문 슬라이드 */
    .keyword { color: white; font-size: 110px; font-weight: 900; line-height: 1.1; margin-bottom: 48px; word-break: keep-all; }
    .body-text { color: rgba(255,255,255,0.9); font-size: 34px; font-weight: 400; line-height: 1.8; word-break: keep-all; text-align: left; }

    /* 하단 */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.3);
      padding-top: 24px; color: rgba(255,255,255,0.6);
      font-size: 22px; font-weight: 500; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <!-- 로고 -->
    <div class="logo">
      <div class="logo-circle">🌳</div>
      <span class="logo-text">열매나무</span>
    </div>

    <!-- 중앙 콘텐츠 -->
    <div class="main">
      {% if slide_type == 'cover' %}
        <div class="badge">{{ badge | upper }}</div>
        <div class="cover-heading">{{ heading }}</div>
        {% if body %}<div class="cover-sub">{{ body }}</div>{% endif %}
      {% else %}
        <div class="keyword">{{ heading }}</div>
        <div class="body-text">{{ body }}</div>
      {% endif %}
    </div>

    <!-- 하단 -->
    <div class="footer">
      <span>SHARE THIS POST</span>
      <span>SAVE THIS POST</span>
    </div>
  </div>
</body>
</html>
